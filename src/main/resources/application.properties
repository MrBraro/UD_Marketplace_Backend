# ==========================================
#  Application
# ==========================================
spring.application.name=ud-marketplace-auth
server.port=8080

# ==========================================
#  Database — H2 in-memory (development)
#  To switch to PostgreSQL/MySQL:
#    1. Replace driver-class-name, url, username, password
#    2. Change jpa.database-platform accordingly
#    3. Change ddl-auto to 'validate' or 'update' in production
# ==========================================
spring.datasource.url=jdbc:h2:mem:udmarketplacedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console — disable in production
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
#  JWT
#  - secret: minimum 32 characters (256 bits) for HS256
#  - expiration-ms: 86400000 = 24 hours
# ==========================================
app.jwt.secret=UdMarketplace_SuperSecretKey_2024_MustBe32CharsOrMore!
app.jwt.expiration-ms=86400000

# ==========================================
#  Logging
# ==========================================
logging.level.com.udmarketplace=DEBUG
logging.level.org.springframework.security=WARN
